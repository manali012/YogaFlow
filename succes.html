<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Booking Confirmation</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
body{
  font-family:Poppins, sans-serif;
  background:#f5f5f5;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.card{
  background:#fff;
  padding:30px;
  border-radius:15px;
  width:400px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

h1{
  text-align:center;
  color:#4CAF50;
}

.detail{
  margin:10px 0;
  font-size:15px;
}

.label{
  font-weight:600;
}

.btn{
  margin-top:20px;
  width:100%;
  padding:12px;
  background:#4CAF50;
  color:white;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

<h1>✅ Booking Confirmed</h1>

<div id="details"></div>

<button class="btn" onclick="goHome()">Go to Home</button>

</div>

<script>

const data = JSON.parse(localStorage.getItem("bookingDetails"))

if(data){

document.getElementById("details").innerHTML = `
  <p class="detail"><span class="label">Name:</span> ${data.name}</p>
  <p class="detail"><span class="label">Email:</span> ${data.email}</p>
  <p class="detail"><span class="label">Phone:</span> ${data.phone}</p>
  <p class="detail"><span class="label">Class:</span> ${data.className}</p>
  
  <p class="detail"><span class="label">Date:</span> ${data.date}</p>
  <p class="detail"><span class="label">Payment:</span> ${data.paymentMethod}</p>
  <p class="detail"><span class="label">Price:</span> ₹${data.price}</p>
`

} else {
document.getElementById("details").innerHTML = "No booking data found"
}

function goHome(){
window.location.href = "home.html"
}

</script>

</body>
</html>
